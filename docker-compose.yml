services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ft_interview}
      POSTGRES_USER: ${POSTGRES_USER:-ft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ft_password}
    ports:
      # Override POSTGRES_HOST_PORT in .env if you already have Postgres on 5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ft_user} -d ${POSTGRES_DB:-ft_interview}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 8000
      POSTGRES_DB: ${POSTGRES_DB:-ft_interview}
      POSTGRES_USER: ${POSTGRES_USER:-ft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ft_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      AMADEUS_MODE: ${AMADEUS_MODE:-mock}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_BASE_URL: ${AMADEUS_BASE_URL:-https://test.api.amadeus.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
